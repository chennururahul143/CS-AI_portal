<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CS AI Tutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --border: #e5e5e5;
            --text-primary: #0a0a0a;
            --text-secondary: #6b6b6b;
            --accent: #0a0a0a;
            --accent-fg: #ffffff;
            --font: 'Geist', -apple-system, sans-serif;
            --radius-xl: 18px;
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --text-primary: #fafafa;
            --text-secondary: #a0a0a0;
            --accent: #ffffff;
            --accent-fg: #0a0a0a;
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: slideUp .3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 56px;
            height: 56px;
            background: var(--accent);
            color: var(--accent-fg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -.02em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font);
            outline: none;
            transition: border-color .15s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: .6;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--accent-fg);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            transition: opacity .15s;
            margin-top: 8px;
        }

        .btn-login:hover {
            opacity: .85;
        }

        .btn-login:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .error-msg {
            background: #fef9c3;
            border: 1px solid #fde047;
            color: #854d0e;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">CS</div>
        <h1>Welcome to CS AI Tutor</h1>
        <p class="subtitle">Enter your name or student ID to continue</p>

        <div class="error-msg" id="error-msg"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Name or Student ID</label>
                <input type="text" id="username" placeholder="e.g. John Smith or 12345678" autocomplete="username"
                    required autofocus>
            </div>
            <button type="submit" class="btn-login" id="login-btn">
                Continue
            </button>
        </form>

        <div class="footer">
            Maynooth University · CS AI Assistant
        </div>
    </div>

    <script>
        // Check if already logged in
        async function checkAuth() {
            try {
                const res = await fetch('/api/check-session');
                const data = await res.json();
                if (data.logged_in) {
                    window.location.href = '/';
                }
            } catch (e) {
                // Not logged in, stay on login page
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if (!username) {
                errorMsg.textContent = 'Please enter your name or student ID';
                errorMsg.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorMsg.classList.remove('show');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message || 'Login failed';
                    errorMsg.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = 'Continue';
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Continue';
            }
        }

        // Auto-detect theme
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        checkAuth();
    </script>
</body>

</html>
